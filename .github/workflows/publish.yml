name: Publish to pub.dev

# Publishes docupass_flutter to pub.dev when a version tag (v*) is pushed, using
# pub.dev's GitHub Actions OIDC automated publishing (no stored token).
#
# ONE-TIME SETUP ON pub.dev (required before the first tag works):
#   1. Sign in to pub.dev with the Google account that should own the package.
#   2. Reserve/own the package, then on its Admin tab enable
#      "Automated publishing" -> "Publishing from GitHub Actions", set
#      Repository = idanalyzer/docupass-flutter and Tag pattern = v{{version}}.
#   (pub.dev may require an initial manual `dart pub publish` to create the
#    package before the admin page exists; after that, tags publish automatically.)

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for pub.dev OIDC
    steps:
      - uses: actions/checkout@v4

      # setup-dart wires the GitHub Actions OIDC token into pub's credentials
      # (uses the job's `id-token: write`). WITHOUT this step the pub client has
      # no OIDC token and `flutter pub publish` falls back to interactive Google
      # OAuth, which hangs forever in CI. flutter-action then provides the
      # Flutter SDK; `flutter pub publish` reads the OIDC creds setup-dart wrote.
      - uses: dart-lang/setup-dart@v1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install deps
        run: flutter pub get

      - name: Verify tag matches pubspec version
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match pubspec.yaml version $VERSION"
            exit 1
          fi

      - name: Validate package
        run: flutter pub publish --dry-run

      - name: Publish
        run: flutter pub publish --force
